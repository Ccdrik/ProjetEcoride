<section class="hero-auth">
    <h1 class="titre-page-principal">Espace administrateur</h1>

    <div class="image-hero-auth">
        <img src="/assets/images/Fondresize.jpg" alt="Illustration EcoRide">
    </div>
</section>

<section class="zone-page">
    <div class="conteneur-page">

        <div class="bloc-admin">
            <h2 class="titre-bloc">Statistiques</h2>

            <div id="admin-stats" class="mb-4">
                <div class="alert alert-info">Chargement des statistiques...</div>
            </div>

            <div class="grille-admin-statistiques">
                <div class="bloc-admin-secondaire">
                    <h3 class="titre-bloc-admin">Covoiturages par jour</h3>
                    <canvas id="chart-covoiturages"></canvas>
                </div>

                <div class="bloc-admin-secondaire">
                    <h3 class="titre-bloc-admin">Gains par jour</h3>
                    <canvas id="chart-gains"></canvas>
                </div>
            </div>
        </div>

        <div class="bloc-admin mt-4">
            <h2 class="titre-bloc">Créer un compte employé</h2>

            <form id="form-employe" class="formulaire-auth">

                <div class="champ-auth">
                    <label for="prenom" class="label-auth">Prénom</label>
                    <input type="text" id="prenom" class="form-control" required>
                </div>

                <div class="champ-auth">
                    <label for="nom" class="label-auth">Nom</label>
                    <input type="text" id="nom" class="form-control" required>
                </div>

                <div class="champ-auth">
                    <label for="email" class="label-auth">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="champ-auth">
                    <label for="password" class="label-auth">Mot de passe</label>
                    <input type="text" id="password" class="form-control" required>
                </div>

                <div class="actions-page">
                    <button type="submit" class="btn btn-primary">
                        Créer un employé
                    </button>
                </div>

            </form>
        </div>

        <div class="bloc-admin mt-4">
            <h2 class="titre-bloc">Gestion des utilisateurs</h2>

            <div id="admin-users">
                <div class="alert alert-info">
                    Chargement des utilisateurs...
                </div>
            </div>
        </div>

    </div>
</section>
