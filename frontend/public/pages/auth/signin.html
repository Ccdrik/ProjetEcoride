<section class="hero-auth">
    <h1 class="titre-page-principal">Voyager vert avec EcoRide !</h1>

    <div class="image-hero-auth">
        <img src="/assets/images/Fondresize.jpg" alt="Illustration EcoRide">
    </div>
</section>

<section class="zone-auth">
    <div class="conteneur-auth">

        <div class="bloc-formulaire-auth">
            <h1 class="titre-auth">Connexion</h1>

            <form id="signin-form" class="formulaire-auth">

                <div class="champ-auth">
                    <label for="EmailInput" class="label-auth">Email</label>
                    <input type="email" class="form-control" id="EmailInput" name="email" placeholder="test@mail.fr"
                        autocomplete="email" required />
                </div>

                <div class="champ-auth">
                    <label for="PasswordInput" class="label-auth">Mot de passe</label>
                    <input type="password" class="form-control" id="PasswordInput" name="password"
                        placeholder="**********" autocomplete="current-password" required />
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Connexion
                </button>

            </form>

            <div class="liens-auth">
                <a href="/inscription" onclick="route(event)">
                    Vous n'avez pas de compte ? Inscrivez-vous ici !
                </a>
            </div>
        </div>

    </div>
</section>
