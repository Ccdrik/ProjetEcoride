<h1 class="main-title text-center">Inscription</h1>
<div class="hero-scene text-center text-white">
    <div class="hero-scene-content"></div>
</div>


<section class="page-container my-4">
    <div class="section-card">
        <form id="signup-form" class="form-container">
            <div class="mb-3">
                <label for="NomInput" class="form-label">Nom</label>
                <input type="text" class="form-control" id="NomInput" name="nom" placeholder="Votre nom" required />
                <div class="invalid-feedback text-center">
                    Le nom est requis !
                </div>
            </div>

            <div class="mb-3">
                <label for="PrenomInput" class="form-label">Prénom</label>
                <input type="text" class="form-control" id="PrenomInput" name="prenom" placeholder="Votre prénom"
                    required />
                <div class="invalid-feedback text-center">
                    Le prénom est requis !
                </div>
            </div>

            <div class="mb-3">
                <label for="EmailInput" class="form-label">Email</label>
                <input type="email" class="form-control" id="EmailInput" name="email" placeholder="test@mail.fr"
                    autocomplete="email" required />
                <div class="invalid-feedback text-center">
                    Le mail n'est pas valide !
                </div>
            </div>

            <!-- ==========================================================
         ROLE
         ==========================================================
         Ton backend accepte ROLE_PASSAGER ou ROLE_CHAUFFEUR.
         Ici on fait simple et propre :
         ========================================================== -->
            <div class="mb-3">
                <label for="RoleSelect" class="form-label">Je suis</label>
                <select class="form-select" id="RoleSelect" name="role" required>
                    <option value="ROLE_PASSAGER" selected>Passager</option>
                    <option value="ROLE_CHAUFFEUR">Chauffeur</option>
                </select>
                <div class="invalid-feedback text-center">
                    Choisissez un rôle.
                </div>
            </div>

            <div class="mb-3">
                <label for="PasswordInput" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="PasswordInput" name="password"
                    autocomplete="new-password" required />
                <div class="invalid-feedback text-center">
                    8 caractères min. + 1 majuscule + 1 minuscule + 1 chiffre + 1 caractère spécial.
                </div>
                <div class="valid-feedback text-center">
                    Mot de passe robuste !
                </div>
            </div>

            <div class="mb-3">
                <label for="ValidatePasswordInput" class="form-label">Confirmez votre mot de passe</label>
                <input type="password" class="form-control" id="ValidatePasswordInput" autocomplete="new-password"
                    required />
                <div class="invalid-feedback text-center">
                    Les mots de passe doivent être identiques !
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary" id="btn-validation-inscription">
                    Inscription
                </button>
            </div>
        </form>
    </div>
</section>

<div class="text-center pt-3">
    <a href="/connexion" onclick="route(event)">
        Vous avez déjà un compte ? Connectez-vous ici !
    </a>
</div>
</div>
