<section class="hero-auth">
    <h1 class="titre-page-principal">Changement de mot de passe</h1>

    <div class="image-hero-auth">
        <img src="/assets/images/Fondresize.jpg" alt="Illustration EcoRide">
    </div>
</section>

<section class="zone-page">
    <div class="conteneur-page-moyen">

        <div class="bloc-formulaire-auth">
            <form class="formulaire-auth">

                <div class="champ-auth">
                    <label for="PasswordInput" class="label-auth">Mot de passe</label>
                    <input type="password" class="form-control" id="PasswordInput">
                </div>

                <div class="champ-auth">
                    <label for="ValidatePasswordInput" class="label-auth">Validez votre mot de passe</label>
                    <input type="password" class="form-control" id="ValidatePasswordInput">
                </div>

                <div class="actions-page texte-centre">
                    <button type="submit" class="btn btn-primary">
                        Changer mon mot de passe
                    </button>
                </div>

                <div class="actions-page texte-centre">
                    <button type="button" class="btn btn-danger">
                        Supprimer mon compte
                    </button>
                </div>

            </form>

            <div class="texte-centre mt-3">
                <a href="/mon-compte" onclick="route(event)">
                    Modifier mes informations personnelles
                </a>
            </div>

        </div>

    </div>
</section>
