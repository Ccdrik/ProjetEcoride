<h1 class="main-title text-center">Changement de mot de passe</h1>

<div class="hero-scene text-center text-white">
    <div class="hero-scene-content"></div>
</div>

<section class="page-container my-4">
    <div class="section-card">
        <form class="form-container">

            <div class="mb-3">
                <label for="PasswordInput" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="PasswordInput">
            </div>

            <div class="mb-3">
                <label for="ValidatePasswordInput" class="form-label">Validez votre mot de passe</label>
                <input type="password" class="form-control" id="ValidatePasswordInput">
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-full">
                    Changer mon mot de passe
                </button>

                <button type="button" class="btn btn-danger btn-full mt-2">
                    Supprimer mon compte
                </button>
            </div>

        </form>

        <div class="text-center pt-3">
            <a href="/mon-compte" onclick="route(event)">
                Modifier mes informations personnelles
            </a>
        </div>

    </div>
</section>
