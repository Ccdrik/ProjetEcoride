<section class="hero-auth">
    <h1 class="titre-page-principal">Détails du trajet</h1>

    <div class="image-hero-auth">
        <img src="/assets/images/Fondresize.jpg" alt="Illustration EcoRide">
    </div>
</section>

<section class="zone-page">
    <div class="conteneur-page-petit">

        <div id="detail-trajet-container" class="bloc-detail-trajet">

            <h2 class="titre-bloc-detail">
                <span id="trajet-depart"></span>
                →
                <span id="trajet-arrivee"></span>
            </h2>

            <p><strong>Date :</strong> <span id="trajet-date"></span></p>
            <p><strong>Conducteur :</strong> <span id="trajet-conducteur"></span></p>
            <p><strong>Note chauffeur :</strong> <span id="trajet-note"></span></p>
            <p><strong>Véhicule :</strong> <span id="trajet-vehicule"></span></p>
            <p><strong>Énergie :</strong> <span id="trajet-energie"></span></p>
            <p><strong>Places disponibles :</strong> <span id="trajet-places"></span></p>
            <p><strong>Prix :</strong> <span id="trajet-prix"></span> crédits</p>

            <div id="bloc-avis-trajet" class="bloc-avis-trajet d-none">

                <hr>

                <h3>Laisser un avis</h3>

                <p class="texte-aide-page">
                    Votre avis sera envoyé en attente de modération avant publication.
                </p>

                <form id="form-avis-trajet" class="formulaire-page formulaire-page--empile">

                    <div class="champ-page">
                        <label for="note-avis" class="label-page">Note</label>

                        <select id="note-avis" class="form-select" required>
                            <option value="">Choisir une note</option>
                            <option value="1"> 1</option>
                            <option value="2"> 2</option>
                            <option value="3"> 3</option>
                            <option value="4"> 4</option>
                            <option value="5"> 5</option>
                        </select>
                    </div>

                    <div class="champ-page">
                        <label for="commentaire-avis" class="label-page">
                            Commentaire
                        </label>

                        <textarea id="commentaire-avis" class="form-control" rows="4"
                            placeholder="Votre commentaire (facultatif)">
                        </textarea>
                    </div>

                    <div class="actions-page">
                        <button type="submit" class="btn btn-primary">
                            Envoyer mon avis
                        </button>
                    </div>

                </form>

                <div id="message-avis-trajet" class="mt-3"></div>

            </div>

        </div>

    </div>
</section>
