<section class="hero-auth">
    <h1 class="titre-page-principal">Accès aux covoiturages</h1>

    <div class="image-hero-auth">
        <img src="/assets/images/Fondresize.jpg" alt="Illustration EcoRide">
    </div>
</section>

<section class="zone-page">
    <div class="conteneur-page">

        <div class="bloc-covoiturages">
            <form id="formulaireRechercheCovoiturages" class="formulaire-covoiturages">

                <div class="grille-recherche-covoiturages">
                    <div class="filtre-page position-relative">
                        <label for="champDepartCovoiturages" class="label-auth">Départ</label>
                        <input type="text" class="form-control" id="champDepartCovoiturages" name="depart"
                            placeholder="Ville de départ" autocomplete="off">

                        <div id="suggestionsDepartCovoiturages" class="list-group position-absolute w-100 shadow-sm"
                            style="z-index:1000; display:none;">
                        </div>
                    </div>

                    <div class="filtre-page position-relative">
                        <label for="champArriveeCovoiturages" class="label-auth">Arrivée</label>
                        <input type="text" class="form-control" id="champArriveeCovoiturages" name="arrivee"
                            placeholder="Ville d’arrivée" autocomplete="off">

                        <div id="suggestionsArriveeCovoiturages" class="list-group position-absolute w-100 shadow-sm"
                            style="z-index:1000; display:none;">
                        </div>
                    </div>

                    <div class="filtre-page">
                        <label for="champDateCovoiturages" class="label-auth">Date</label>
                        <input type="date" class="form-control" id="champDateCovoiturages" name="date">
                    </div>
                </div>

                <div class="bloc-filtres">
                    <div class="ligne-filtres">
                        <div class="filtre-page filtre-page-checkbox">
                            <label class="label-checkbox-covoiturages" for="filtreEcologique">
                                <input type="checkbox" id="filtreEcologique">
                                Trajets écologiques
                            </label>
                        </div>

                        <div class="filtre-page">
                            <label for="filtrePrixMax" class="label-auth">Prix max (Crédits)</label>
                            <input class="form-control" type="number" id="filtrePrixMax" placeholder="ex : 20">
                        </div>

                        <div class="filtre-page">
                            <label for="filtreDureeMax" class="label-auth">Durée max (min)</label>
                            <input class="form-control" type="number" id="filtreDureeMax" placeholder="ex : 120">
                        </div>

                        <div class="filtre-page">
                            <label for="filtreNoteMin" class="label-auth">Note min</label>
                            <select class="form-select" id="filtreNoteMin">
                                <option value="">--</option>
                                <option value="1">1+</option>
                                <option value="2">2+</option>
                                <option value="3">3+</option>
                                <option value="4">4+</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions-page actions-covoiturages">
                        <button class="btn btn-primary" type="submit">Rechercher</button>
                        <button class="btn btn-outline-secondary" type="button" id="boutonAppliquerFiltres">
                            Appliquer les filtres
                        </button>
                        <button class="btn btn-outline-dark" type="button" id="boutonVoirTousCovoiturages">
                            Voir tous les covoiturages
                        </button>
                        <button class="btn btn-outline-danger" type="button" id="boutonReinitialiserCovoiturages">
                            Réinitialiser
                        </button>
                    </div>
                </div>

            </form>
        </div>

        <div class="bloc-resultats-covoiturages">
            <div id="zoneDateProche" class="alert alert-info d-none"></div>
            <p id="texteAideCovoiturages" class="texte-aide-page"></p>
            <div id="zoneChargementCovoiturages" class="d-none">Chargement...</div>
            <div id="zoneTrajets" class="mt-4 d-none"></div>
        </div>

    </div>
</section>
