<h1 class="main-title text-center">Ajouter un véhicule</h1>
<div class="hero-scene text-center text-white">
    <div class="hero-scene-content"></div>
</div>

<section class="page-container">
    <div class="section-card">
        <form id="form-ajouter-vehicule" class="form-container card p-4 shadow-sm">
            <div class="mb-3">
                <label for="vehicule-marque" class="form-label">Marque</label>
                <input id="vehicule-marque" class="form-control" type="text" required>
            </div>

            <div class="mb-3">
                <label for="vehicule-modele" class="form-label">Modèle</label>
                <input id="vehicule-modele" class="form-control" type="text" required>
            </div>

            <div class="mb-3">
                <label for="vehicule-energie" class="form-label">Énergie</label>
                <input id="vehicule-energie" class="form-control" type="text" required>
            </div>

            <div class="mb-3">
                <label for="vehicule-couleur" class="form-label">Couleur</label>
                <input id="vehicule-couleur" class="form-control" type="text">
            </div>

            <div class="mb-3">
                <label for="vehicule-immatriculation" class="form-label">Immatriculation</label>
                <input id="vehicule-immatriculation" class="form-control" type="text">
            </div>

            <div class="mb-3">
                <label for="vehicule-nbPlaces" class="form-label">Nombre de places</label>
                <input id="vehicule-nbPlaces" class="form-control" type="number" min="1">
            </div>

            <button class="btn btn-success" type="submit">Ajouter le véhicule</button>
        </form>
    </div>
</section>
