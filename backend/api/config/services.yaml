# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# ============================================================
# Configuration des services de l'application EcoRide
# ============================================================

# Paramètres globaux de l'application
# (Ne pas mettre de secrets ici en production)
parameters:
    # Paramètres MongoDB (valeurs récupérées depuis .env.local)
    mongodb_uri: '%env(MONGODB_URI)%'
    mongodb_db: '%env(MONGODB_DB)%'

services:

    # ------------------------------------------------------------
    # Configuration par défaut des services
    # ------------------------------------------------------------
    _defaults:
        autowire: true      # Injection automatique des dépendances
        autoconfigure: true # Enregistre automatiquement commandes, events, etc.

    # ------------------------------------------------------------
    # Déclaration automatique des classes du dossier src/
    # ------------------------------------------------------------
    # Chaque classe devient un service avec son FQCN comme identifiant
    App\:
        resource: '../src/'

    # ------------------------------------------------------------
    # Service MongoProvider (connexion MongoDB)
    # ------------------------------------------------------------
    # Permet d'accéder à la collection "avis"
    App\Service\Mongo\MongoProvider:
        arguments:
            $uri: '%mongodb_uri%'
            $dbName: '%mongodb_db%'